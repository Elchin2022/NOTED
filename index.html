<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Notes</title>

<style>
:root {
  --primary: #4f46e5;
  --danger: #ef4444;
  --bg: #f3f4f6;
  --card: #ffffff;
  --text: #111827;
  --muted: #6b7280;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 700px;
  padding: 16px;
}

h1 {
  text-align: center;
  margin-bottom: 16px;
}

form {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

input[type="text"] {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  border: none;
  cursor: pointer;
  border-radius: 10px;
  padding: 10px 14px;
  font-weight: 500;
  transition: 0.2s ease;
  font-size: 14px;
}

.primary-btn {
  background: var(--primary);
  color: white;
}

.secondary-btn {
  background: #e5e7eb;
}

.danger-btn {
  background: var(--danger);
  color: white;
}

.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.word-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.word-card {
  background: var(--card);
  padding: 14px;
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

.word-text {
  margin: 0;
  font-size: 18px;
  user-select: text;
  -webkit-user-select: text;
  word-break: break-word;
}

.word-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.edit-input {
  width: 100%;
  padding: 8px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Mobile optimization */
@media (max-width: 480px) {
  form {
    flex-direction: column;
  }

  button {
    width: 100%;
  }

  .controls {
    flex-direction: column;
  }

  .word-card {
    flex-direction: column;
    align-items: stretch;
  }

  .word-actions {
    justify-content: space-between;
  }
}

</style>
</head>
<body>

<div class="container">

<h1>📘 Saved Words</h1>

<form id="addWordForm">
  <input type="text" id="newWordInput" placeholder="Add a word manually" required />
  <button type="submit" class="primary-btn">Add</button>
</form>

<div class="controls">
  <button id="sortBtn" class="secondary-btn">Sort A–Z</button>
  <button id="copyBtn" class="secondary-btn">Copy All</button>
</div>

<div id="words" class="word-list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  updateDoc,
  doc,
  query, 
  orderBy,
  where
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq4hwjFnkPBNzzeJ-HaE-bo_EWGpjzO0k",
  authDomain: "wocabulary-53f18.firebaseapp.com",
  projectId: "wocabulary-53f18",
  storageBucket: "wocabulary-53f18.firebasestorage.app",
  messagingSenderId: "581676289234",
  appId: "1:581676289234:web:146c7c108fa099b3a6f10b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const wordsCollection = collection(db, "words");

const wordsContainer = document.getElementById("words");
let currentWords = [];

const params = new URLSearchParams(window.location.search);
const wordParam = params.get("q");

async function saveWord(word) {
  const cleanWord = word.trim().toLowerCase();
  if (!cleanWord) return;

  const existingQuery = query(
    wordsCollection,
    where("word", "==", cleanWord)
  );

  const snapshot = await getDocs(existingQuery);

  if (snapshot.empty) {
    await addDoc(wordsCollection, {
      word: cleanWord,
      created: new Date()
    });
  }
}

async function deleteWord(id) {
  await deleteDoc(doc(db, "words", id));
  await loadWords();
}

async function updateWord(id, newWord) {
  await updateDoc(doc(db, "words", id), {
    word: newWord.trim().toLowerCase()
  });
  await loadWords();
}

async function loadWords() {
  const qRef = query(wordsCollection, orderBy("created", "desc"));
  const snapshot = await getDocs(qRef);

  currentWords = snapshot.docs.map(docSnap => ({
    id: docSnap.id,
    word: docSnap.data().word
  }));

  renderWords(currentWords);
}

function renderWords(wordsArray) {
  wordsContainer.innerHTML = "";

  wordsArray.forEach(item => {

    const card = document.createElement("div");
    card.className = "word-card";

    const wordText = document.createElement("p");
    wordText.className = "word-text";
    wordText.textContent = item.word;

    const actions = document.createElement("div");
    actions.className = "word-actions";

    const editBtn = document.createElement("button");
    editBtn.textContent = "Edit";
    editBtn.className = "secondary-btn";

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.className = "danger-btn";

    editBtn.onclick = () => enableEdit(card, item);
    deleteBtn.onclick = () => deleteWord(item.id);

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);

    card.appendChild(wordText);
    card.appendChild(actions);

    wordsContainer.appendChild(card);
  });
}

function enableEdit(card, item) {

  card.innerHTML = "";

  const input = document.createElement("input");
  input.className = "edit-input";
  input.value = item.word;

  const saveBtn = document.createElement("button");
  saveBtn.textContent = "Save";
  saveBtn.className = "primary-btn";

  const cancelBtn = document.createElement("button");
  cancelBtn.textContent = "Cancel";
  cancelBtn.className = "secondary-btn";

  const actions = document.createElement("div");
  actions.className = "word-actions";
  actions.appendChild(saveBtn);
  actions.appendChild(cancelBtn);

  card.appendChild(input);
  card.appendChild(actions);

  saveBtn.onclick = async () => {
    await updateWord(item.id, input.value);
  };

  cancelBtn.onclick = () => loadWords();
}

(async () => {
  if (wordParam) {
    await saveWord(wordParam);
  }
  await loadWords();
})();

document.getElementById("addWordForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const input = document.getElementById("newWordInput");
  const word = input.value.trim();
  if (!word) return;
  await saveWord(word);
  input.value = "";
  await loadWords();
});

document.getElementById("sortBtn").addEventListener("click", () => {
  const sorted = [...currentWords].sort((a, b) =>
    a.word.localeCompare(b.word)
  );
  renderWords(sorted);
});

document.getElementById("copyBtn").addEventListener("click", async () => {
  if (!currentWords.length) return;

  const textToCopy = currentWords
    .map(item => item.word)
    .join("\n");

  await navigator.clipboard.writeText(textToCopy);
  alert("Copied to clipboard!");
});

</script>
</body>
</html>
