<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Notes</title>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 600px;
    margin: auto;
  }

  h1 {
    margin-bottom: 10px;
  }

  input {
    padding: 6px;
    width: 60%;
  }

  button {
    padding: 6px 10px;
    margin-left: 5px;
    cursor: pointer;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #ddd;
  }

  .word {
    font-weight: bold;
  }

  .controls button {
    margin-left: 5px;
  }
</style>
</head>
<body>

<h1>Saved Words</h1>

<input id="newWordInput" placeholder="Add word manually">
<button onclick="addWord()">Add</button>

<ul id="wordList"></ul>

<script>
const params = new URLSearchParams(window.location.search);
const queryWord = params.get("q");

const STORAGE_KEY = "savedWords";

function getWords() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}

function saveWords(words) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
}

function render() {
  const words = getWords();
  const list = document.getElementById("wordList");
  list.innerHTML = "";

  words.forEach((word, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span class="word">${word}</span>
      <div class="controls">
        <button onclick="editWord(${index})">Edit</button>
        <button onclick="deleteWord(${index})">Delete</button>
      </div>
    `;

    list.appendChild(li);
  });
}

function addWord(wordParam) {
  const words = getWords();

  let word = wordParam || document.getElementById("newWordInput").value.trim();

  if (!word) return;

  word = word.toLowerCase();

  // prevent duplicates
  const existingIndex = words.indexOf(word);
  if (existingIndex !== -1) {
    words.splice(existingIndex, 1);
  }

  words.unshift(word); // newest first
  saveWords(words);

  document.getElementById("newWordInput").value = "";
  render();
}

function deleteWord(index) {
  const words = getWords();
  words.splice(index, 1);
  saveWords(words);
  render();
}

function editWord(index) {
  const words = getWords();
  const newWord = prompt("Edit word:", words[index]);
  if (newWord && newWord.trim()) {
    words[index] = newWord.trim().toLowerCase();
    saveWords(words);
    render();
  }
}

// Auto-save from URL
if (queryWord) {
  addWord(queryWord);
}

render();
</script>

</body>
</html>
