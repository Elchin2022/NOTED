<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Notes</title>

<style>
  :root {
    --primary: #4f46e5;
    --danger: #ef4444;
    --bg: #f9fafb;
    --card: #ffffff;
    --text: #111827;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 700px;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  form {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  input[type="text"] {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ddd;
  }

  button {
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: 0.2s ease;
  }

  .primary-btn {
    background: var(--primary);
    color: white;
  }

  .primary-btn:hover {
    opacity: 0.9;
  }

  .secondary-btn {
    background: #e5e7eb;
  }

  .secondary-btn:hover {
    background: #d1d5db;
  }

  .danger-btn {
    background: var(--danger);
    color: white;
    padding: 6px 10px;
  }

  .danger-btn:hover {
    opacity: 0.85;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .word-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .word-card {
    background: var(--card);
    padding: 14px 16px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .word-text {
    margin: 0;
    font-size: 18px;
    user-select: text;
    -webkit-user-select: text;
  }

  @media (max-width: 480px) {
    form {
      flex-direction: column;
    }

    button {
      width: 100%;
    }

    .controls {
      flex-direction: column;
    }
  }

</style>
</head>
<body>

<div class="container">

<h1>📘 Saved Words</h1>

<form id="addWordForm">
  <input type="text" id="newWordInput" placeholder="Add a word manually" required />
  <button type="submit" class="primary-btn">Add</button>
</form>

<div class="controls">
  <button id="sortBtn" class="secondary-btn">Sort A–Z</button>
  <button id="copyBtn" class="secondary-btn">Copy All</button>
</div>

<div id="words" class="word-list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  doc,
  query, 
  orderBy,
  where
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq4hwjFnkPBNzzeJ-HaE-bo_EWGpjzO0k",
  authDomain: "wocabulary-53f18.firebaseapp.com",
  projectId: "wocabulary-53f18",
  storageBucket: "wocabulary-53f18.firebasestorage.app",
  messagingSenderId: "581676289234",
  appId: "1:581676289234:web:146c7c108fa099b3a6f10b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const wordsCollection = collection(db, "words");

const wordsContainer = document.getElementById("words");
let currentWords = [];

const params = new URLSearchParams(window.location.search);
const wordParam = params.get("q");

async function saveWord(word) {
  const cleanWord = word.trim().toLowerCase();
  if (!cleanWord) return;

  const existingQuery = query(
    wordsCollection,
    where("word", "==", cleanWord)
  );

  const snapshot = await getDocs(existingQuery);

  if (snapshot.empty) {
    await addDoc(wordsCollection, {
      word: cleanWord,
      created: new Date()
    });
  }
}

async function deleteWord(id) {
  await deleteDoc(doc(db, "words", id));
  await loadWords();
}

async function loadWords() {
  const qRef = query(wordsCollection, orderBy("created", "desc"));
  const snapshot = await getDocs(qRef);

  currentWords = snapshot.docs.map(docSnap => ({
    id: docSnap.id,
    word: docSnap.data().word
  }));

  renderWords(currentWords);
}

function renderWords(wordsArray) {
  wordsContainer.innerHTML = "";

  wordsArray.forEach(item => {

    const card = document.createElement("div");
    card.className = "word-card";

    const wordText = document.createElement("p");
    wordText.className = "word-text";
    wordText.textContent = item.word;

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.className = "danger-btn";
    deleteBtn.onclick = () => deleteWord(item.id);

    card.appendChild(wordText);
    card.appendChild(deleteBtn);
    wordsContainer.appendChild(card);
  });
}

(async () => {
  if (wordParam) {
    await saveWord(wordParam);
  }
  await loadWords();
})();

document.getElementById("addWordForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const input = document.getElementById("newWordInput");
  const word = input.value.trim();
  if (!word) return;
  await saveWord(word);
  input.value = "";
  await loadWords();
});

document.getElementById("sortBtn").addEventListener("click", () => {
  const sorted = [...currentWords].sort((a, b) => 
    a.word.localeCompare(b.word)
  );
  renderWords(sorted);
});

document.getElementById("copyBtn").addEventListener("click", async () => {

  if (!currentWords.length) return;

  const textToCopy = currentWords
    .map(item => item.word)
    .join("\n");

  try {
    await navigator.clipboard.writeText(textToCopy);
    alert("Copied to clipboard!");
  } catch {
    alert("Copy failed.");
  }

});

</script>

</body>
</html>
