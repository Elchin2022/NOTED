
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Notes</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  form {
    display: flex;
    margin-bottom: 10px;
  }

  input[type="text"] {
    flex: 1;
    padding: 6px;
    font-size: 16px;
  }

  button {
    cursor: pointer;
    padding: 4px 8px;
    margin-left: 5px;
  }

  #controls {
    margin-bottom: 10px;
  }

  #words {
    margin-top: 20px;
  }

  .word-item {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
  }

  .word-text {
    font-size: 18px;
    margin: 0;
    user-select: text;
    -webkit-user-select: text;
  }

  .delete-btn {
    margin-top: 5px;
  }

</style>
</head>
<body>

<h1>Saved Words</h1>

<!-- Add Word Form -->
<form id="addWordForm">
  <input type="text" id="newWordInput" placeholder="Add a word manually" required />
  <button type="submit">Add</button>
</form>

<div id="controls">
  <button id="sortBtn">Sort Alphabetically</button>
  <button id="copyBtn">Copy All</button>
</div>

<div id="words"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  doc,
  query, 
  orderBy,
  where
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq4hwjFnkPBNzzeJ-HaE-bo_EWGpjzO0k",
  authDomain: "wocabulary-53f18.firebaseapp.com",
  projectId: "wocabulary-53f18",
  storageBucket: "wocabulary-53f18.firebasestorage.app",
  messagingSenderId: "581676289234",
  appId: "1:581676289234:web:146c7c108fa099b3a6f10b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const wordsCollection = collection(db, "words");

const wordsContainer = document.getElementById("words");
let currentWords = [];

const params = new URLSearchParams(window.location.search);
const wordParam = params.get("q");

async function saveWord(word) {
  const cleanWord = word.trim().toLowerCase();
  if (!cleanWord) return;

  const existingQuery = query(
    wordsCollection,
    where("word", "==", cleanWord)
  );

  const snapshot = await getDocs(existingQuery);

  if (snapshot.empty) {
    await addDoc(wordsCollection, {
      word: cleanWord,
      created: new Date()
    });
  }
}

async function deleteWord(id) {
  await deleteDoc(doc(db, "words", id));
  location.reload();
}

async function loadWords() {
  const qRef = query(wordsCollection, orderBy("created", "desc"));
  const snapshot = await getDocs(qRef);

  currentWords = snapshot.docs.map(docSnap => ({
    id: docSnap.id,
    word: docSnap.data().word
  }));

  renderWords(currentWords);
}

function renderWords(wordsArray) {
  wordsContainer.innerHTML = "";

  wordsArray.forEach(item => {

    const card = document.createElement("div");
    card.className = "word-card";

    const wordText = document.createElement("p");
    wordText.className = "word-text";
    wordText.textContent = item.word;

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.className = "danger-btn";
    deleteBtn.onclick = () => deleteWord(item.id);

    card.appendChild(wordText);
    card.appendChild(deleteBtn);
    wordsContainer.appendChild(card);
  });
}

(async () => {

  if (wordParam) {
    await saveWord(wordParam);
    // remove ?q= from URL after saving
    window.location.href = window.location.pathname;
    return;
  }

  await loadWords();

})();

document.getElementById("addWordForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const input = document.getElementById("newWordInput");
  const word = input.value.trim();
  if (!word) return;

  await saveWord(word);

  // reload clean page
  window.location.reload();
});

document.getElementById("sortBtn").addEventListener("click", () => {
  const sorted = [...currentWords].sort((a, b) => 
    a.word.localeCompare(b.word)
  );
  renderWords(sorted);
});

document.getElementById("copyBtn").addEventListener("click", async () => {

  if (!currentWords.length) return;

  const textToCopy = currentWords
    .map(item => item.word)
    .join("\n");

  try {
    await navigator.clipboard.writeText(textToCopy);
    alert("Copied to clipboard!");
  } catch {
    alert("Copy failed.");
  }

});

</script>


</body>
</html>
