<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Notes</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  #words {
    margin-top: 20px;
  }

  .word-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid #ddd;
    font-size: 18px;
  }

  button {
    cursor: pointer;
    padding: 2px 6px;
    margin-left: 8px;
  }

  form {
    display: flex;
    margin-bottom: 10px;
  }

  input[type="text"] {
    flex: 1;
    padding: 6px;
    font-size: 16px;
  }
</style>
</head>
<body>

<h1>Saved Words</h1>

<!-- Add Word Form -->
<form id="addWordForm">
  <input type="text" id="newWordInput" placeholder="Add a word manually" required />
  <button type="submit">Add</button>
</form>

<!-- Sort Button -->
<button id="sortBtn">Sort Alphabetically</button>

<!-- Word List -->
<div id="words"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  deleteDoc,
  doc,
  query, 
  orderBy,
  where
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq4hwjFnkPBNzzeJ-HaE-bo_EWGpjzO0k",
  authDomain: "wocabulary-53f18.firebaseapp.com",
  projectId: "wocabulary-53f18",
  storageBucket: "wocabulary-53f18.firebasestorage.app",
  messagingSenderId: "581676289234",
  appId: "1:581676289234:web:146c7c108fa099b3a6f10b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const wordsCollection = collection(db, "words");

const wordsContainer = document.getElementById("words");

// URL parameter saving
const params = new URLSearchParams(window.location.search);
const wordParam = params.get("q");

async function saveWord(word) {
  const cleanWord = word.trim().toLowerCase();
  if (!cleanWord) return;

  // prevent duplicates
  const existingQuery = query(
    wordsCollection,
    where("word", "==", cleanWord)
  );
  const snapshot = await getDocs(existingQuery);
  if (snapshot.empty) {
    await addDoc(wordsCollection, {
      word: cleanWord,
      created: new Date()
    });
  }
}

async function deleteWord(id) {
  await deleteDoc(doc(db, "words", id));
  await loadWords();
}

let currentWords = []; // store loaded words

async function loadWords() {
  const qRef = query(wordsCollection, orderBy("created", "desc"));
  const snapshot = await getDocs(qRef);
  currentWords = snapshot.docs.map(docSnap => ({ id: docSnap.id, word: docSnap.data().word }));
  renderWords(currentWords);
}

function renderWords(wordsArray) {
  wordsContainer.innerHTML = "";
  wordsArray.forEach(item => {
    const div = document.createElement("div");
    div.className = "word-item";
    div.textContent = item.word;

    const delBtn = document.createElement("button");
    delBtn.textContent = "Delete";
    delBtn.onclick = () => deleteWord(item.id);

    div.appendChild(delBtn);
    wordsContainer.appendChild(div);
  });
}

// Save word from URL
(async () => {
  if (wordParam) {
    await saveWord(wordParam);
  }
  await loadWords();
})();

// Form submit handler
document.getElementById("addWordForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const input = document.getElementById("newWordInput");
  const word = input.value.trim();
  if (!word) return;
  await saveWord(word);
  input.value = "";
  await loadWords();
});

// Sort alphabetically
document.getElementById("sortBtn").addEventListener("click", () => {
  const sorted = [...currentWords].sort((a, b) => a.word.localeCompare(b.word));
  renderWords(sorted);
});

</script>
</body>
</html>
