<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs,
  query, 
  orderBy,
  where
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq4hwjFnkPBNzzeJ-HaE-bo_EWGpjzO0k",
  authDomain: "wocabulary-53f18.firebaseapp.com",
  projectId: "wocabulary-53f18",
  storageBucket: "wocabulary-53f18.firebasestorage.app",
  messagingSenderId: "581676289234",
  appId: "1:581676289234:web:146c7c108fa099b3a6f10b",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const wordsCollection = collection(db, "words");

// 1️⃣ Check URL for ?q=
const params = new URLSearchParams(window.location.search);
const wordParam = params.get("q");

async function saveWord(word) {
  const cleanWord = word.trim().toLowerCase();

  // prevent duplicates
  const existingQuery = query(
    wordsCollection,
    where("word", "==", cleanWord)
  );

  const snapshot = await getDocs(existingQuery);

  if (snapshot.empty) {
    await addDoc(wordsCollection, {
      word: cleanWord,
      created: new Date()
    });
  }
}

async function loadWords() {
  const qRef = query(
    wordsCollection,
    orderBy("created", "desc")
  );

  const snapshot = await getDocs(qRef);

  const container = document.getElementById("words");
  container.innerHTML = "";

  snapshot.forEach((doc) => {
    const div = document.createElement("div");
    div.textContent = doc.data().word;
    container.appendChild(div);
  });
}

(async () => {

  // Save if word exists in URL
  if (wordParam) {
    await saveWord(wordParam);
  }

  // Always load words
  await loadWords();

})();

</script>
