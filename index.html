<script>
const STORAGE_KEY = "savedWords";

function getWords() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}

function saveWords(words) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
}

function render() {
  const words = getWords();
  const list = document.getElementById("wordList");
  list.innerHTML = "";

  if (words.length === 0) {
    list.innerHTML = "<p>No saved words yet.</p>";
    return;
  }

  words.forEach((word, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span class="word">${word}</span>
      <div class="controls">
        <button onclick="editWord(${index})">Edit</button>
        <button onclick="deleteWord(${index})">Delete</button>
      </div>
    `;

    list.appendChild(li);
  });
}

function addWord(wordParam) {
  let word = wordParam?.trim().toLowerCase();
  if (!word) return;

  const words = getWords();

  // Move to top if exists
  const existingIndex = words.indexOf(word);
  if (existingIndex !== -1) {
    words.splice(existingIndex, 1);
  }

  words.unshift(word); // newest first
  saveWords(words);
}

function deleteWord(index) {
  const words = getWords();
  words.splice(index, 1);
  saveWords(words);
  render();
}

function editWord(index) {
  const words = getWords();
  const newWord = prompt("Edit word:", words[index]);
  if (newWord && newWord.trim()) {
    words[index] = newWord.trim().toLowerCase();
    saveWords(words);
    render();
  }
}

/* -------------------------------
   On Page Load Logic
--------------------------------- */

document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const queryWord = params.get("q");

  if (queryWord) {
    addWord(queryWord);

    // Optional: remove query from URL after saving
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  render();
});
</script>
