<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  query, 
  orderBy, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDq4hwjFnkPBNzzeJ-HaE-bo_EWGpjzO0k",
  authDomain: "wocabulary-53f18.firebaseapp.com",
  projectId: "wocabulary-53f18",
  storageBucket: "wocabulary-53f18.firebasestorage.app",
  messagingSenderId: "581676289234",
  appId: "1:581676289234:web:146c7c108fa099b3a6f10b",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Get ?q=word from URL
const params = new URLSearchParams(window.location.search);
const word = params.get("q");

// Save word if exists
if (word) {
  await addDoc(collection(db, "words"), {
    word: word.toLowerCase(),
    created: new Date()
  });
}

// Display words (newest first)
const qRef = query(
  collection(db, "words"), 
  orderBy("created", "desc")
);

onSnapshot(qRef, (snapshot) => {
  const container = document.getElementById("words");
  container.innerHTML = "";

  snapshot.forEach((doc) => {
    const div = document.createElement("div");
    div.textContent = doc.data().word;
    container.appendChild(div);
  });
});

</script>
